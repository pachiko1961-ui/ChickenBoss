<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>雞老闆輕食料理 - 線上點餐</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
<style>
:root{
    --main:#e63946;
    --light:#fff5f5;
    --dark:#2d3748;
    --gray:#f3f4f6;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#f3f4f6;font-family:Microsoft JhengHei,sans-serif;padding-bottom:80px;}
.sticky-top{position:sticky;top:0;z-index:30;}
.header{background:var(--main);color:#fff;text-align:center;padding:16px 0;box-shadow:0 2px 6px #0002;}
.header h1{font-size:20px;font-weight:bold;}
.header p{font-size:13px;opacity:0.9;margin-top:4px;}
.tab-wrap{display:flex;overflow-x:auto;background:#fff;position:sticky;top:60px;z-index:20;box-shadow:0 1px 3px #0001;}
.tab-item{white-space:nowrap;padding:12px 16px;font-size:14px;color:#666;cursor:pointer;}
.tab-active{border-bottom:3px solid var(--main);color:var(--main);font-weight:bold;}
.container{padding:12px;}
.food-item{background:#fff;border-radius:12px;padding:12px;margin-bottom:12px;display:flex;box-shadow:0 1px 4px #0001;}
.food-item:active{transform:scale(0.98);transition:0.2s;}
.food-img{width:80px;height:80px;border-radius:8px;object-fit:cover;}
.food-info{flex:1;margin-left:12px;}
.food-name{font-weight:bold;font-size:15px;}
.food-price{color:var(--main);font-weight:bold;margin:4px 0;}
.food-desc{font-size:12px;color:#999;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.add-btn{align-self:center;font-size:22px;color:var(--main);cursor:pointer;}

/* 彈窗通用 */
.modal{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:50;display:none;align-items:center;justify-content:center;padding:16px;}
.modal-box{background:#fff;border-radius:12px;width:100%;max-width:360px;overflow:hidden;animation:fadeIn 0.2s;}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
.cart-modal{align-items:flex-end;}
.cart-content{background:#fff;width:100%;border-radius:20px 20px 0 0;padding:16px;max-height:70vh;overflow-y:auto;}

.taste-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:16px 0;}
.taste-label{border:1px solid #ddd;border-radius:8px;padding:12px;text-align:center;cursor:pointer;}
.btn{padding:10px;border-radius:8px;border:none;cursor:pointer;font-size:14px;}
.btn-gray{border:1px solid #ddd;background:#fff;}
.btn-red{background:var(--main);color:#fff;}
.cart-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid #eee;}
.cart-img{width:56px;height:56px;border-radius:6px;object-fit:cover;}
.num-btn{width:26px;height:26px;border:1px solid #ccc;border-radius:4px;text-align:center;line-height:26px;display:inline-block;cursor:pointer;}
.footer-cart{position:fixed;bottom:0;left:0;width:100%;background:#fff;border-top:1px solid #eee;display:flex;align-items:center;justify-content:space-between;padding:12px 16px;z-index:40;}
.cart-badge{color:var(--main);font-weight:bold;}
.go-cart{background:var(--main);color:#fff;padding:8px 20px;border-radius:20px;font-size:14px;}
</style>
</head>
<body>
<!-- 頂部標題 -->
<div class="header sticky-top">
    <h1>雞老闆輕食料理</h1>
    <p>掃碼快速點餐 · 新鮮現做</p>
</div>

<!-- 分類標籤 -->
<div class="tab-wrap">
    <div class="tab-item tab-active" data-type="recommend">雞老闆推薦菜單</div>
    <div class="tab-item" data-type="meat">肉類</div>
    <div class="tab-item" data-type="offal">內臟</div>
    <div class="tab-item" data-type="veg">時蔬類</div>
    <div class="tab-item" data-type="other">其他類</div>
</div>

<!-- 菜品列表 -->
<div class="container" id="foodList"></div>

<!-- 底部購物車 -->
<div class="footer-cart">
    <div class="flex-item">
        <i class="fa fa-shopping-cart" style="font-size:18px;color:var(--main);"></i>
        <span style="margin-left:6px;">共 <span id="cartNum" class="cart-badge">0</span> 項</span>
    </div>
    <button class="go-cart" onclick="openCart()">查看購物車</button>
</div>

<!-- 菜品詳情彈窗 -->
<div id="foodModal" class="modal">
    <div class="modal-box">
        <img id="modalImg" src="" style="width:100%;height:190px;object-fit:cover;">
        <div style="padding:16px;">
            <h2 id="modalName" style="font-size:17px;font-weight:bold;"></h2>
            <p id="modalPrice" style="color:var(--main);font-weight:bold;margin:6px 0;"></p>
            <p id="modalDesc" style="color:#666;font-size:14px;line-height:1.6;"></p>
            <div style="display:flex;gap:10px;margin-top:20px;">
                <button class="btn btn-gray" style="flex:1;" onclick="closeFoodModal()">關閉</button>
                <button class="btn btn-red" style="flex:1;" onclick="addCartFromModal()">加入購物車</button>
            </div>
        </div>
    </div>
</div>

<!-- 口味選擇彈窗 -->
<div id="tasteModal" class="modal">
    <div class="modal-box" style="padding:20px;">
        <h3 style="font-size:16px;font-weight:bold;">選擇口味</h3>
        <div class="taste-grid">
            <label class="taste-label"><input type="radio" name="taste" value="原味" checked> 原味</label>
            <label class="taste-label"><input type="radio" name="taste" value="蒜味"> 蒜味</label>
            <label class="taste-label"><input type="radio" name="taste" value="椒麻"> 椒麻</label>
            <label class="taste-label"><input type="radio" name="taste" value="泰式"> 泰式</label>
            <label class="taste-label" style="grid-column:1/3;"><input type="radio" name="taste" value="檸檬"> 檸檬</label>
        </div>
        <div style="display:flex;gap:10px;margin-top:10px;">
            <button class="btn btn-gray" style="flex:1;" onclick="closeTasteModal()">取消</button>
            <button class="btn btn-red" style="flex:1;" onclick="confirmAddCart()">確認加入</button>
        </div>
    </div>
</div>

<!-- 購物車彈窗 -->
<div id="cartModal" class="modal cart-modal">
    <div class="cart-content">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;">
            <h3 style="font-size:16px;font-weight:bold;">我的餐點</h3>
            <i class="fa fa-times" style="font-size:18px;cursor:pointer;" onclick="closeCart()"></i>
        </div>
        <div id="cartList"></div>
        <div style="border-top:1px solid #eee;padding-top:15px;margin-top:15px;">
            <div style="display:flex;justify-content:space-between;margin-bottom:15px;">
                <span>總金額</span>
                <span id="totalPrice" style="font-size:17px;color:var(--main);font-weight:bold;">$0</span>
            </div>
            <button class="btn btn-red" style="width:100%;padding:12px;">立即結帳</button>
        </div>
    </div>
</div>

<script>
// 菜品資料
const foodData = [
    {id:1,name:"招牌香雞排",price:75,type:"recommend",img:"https://picsum.photos/400/300?1",desc:"本店人氣第一名，外酥內嫩鹹香入味，輕食無負擔。"},
    {id:2,name:"綜合輕食拼盤",price:120,type:"recommend",img:"https://picsum.photos/400/300?2",desc:"多種食材一次滿足，朋友聚餐、點心首選。"},
    {id:3,name:"香烤雞肉",price:65,type:"meat",img:"https://picsum.photos/400/300?3",desc:"低脂清爽輕食，健身族群最愛。"},
    {id:4,name:"鹹酥豬肉",price:80,type:"meat",img:"https://picsum.photos/400/300?4",desc:"鹹香夠味，配茶配酒都合適。"},
    {id:5,name:"鹹酥雞胗",price:55,type:"offal",img:"https://picsum.photos/400/300?5",desc:"Q彈有嚼勁，越吃越涮嘴。"},
    {id:6,name:"香煎大腸",price:90,type:"offal",img:"https://picsum.photos/400/300?6",desc:"處理乾淨無腥味，香氣濃厚。"},
    {id:7,name:"鹹酥高麗菜",price:40,type:"veg",img:"https://picsum.photos/400/300?7",desc:"清爽解膩，吃炸物必點配菜。"},
    {id:8,name:"綜合時蔬",price:50,type:"veg",img:"https://picsum.photos/400/300?8",desc:"多種新鮮蔬菜搭配，營養均衡。"},
    {id:9,name:"黃金薯條",price:45,type:"other",img:"https://picsum.photos/400/300?9",desc:"外脆內綿，大人小孩都喜愛。"},
    {id:10,name:"手作甜不辣",price:50,type:"other",img:"https://picsum.photos/400/300?10",desc:"手工製作口感紮實，風味濃厚。"}
]

let nowFood = null;
let cart = [];
let nowType = "recommend";

// 切換分類
document.querySelectorAll(".tab-item").forEach(item=>{
    item.addEventListener("click",function(){
        document.querySelectorAll(".tab-item").forEach(t=>t.classList.remove("tab-active"));
        this.classList.add("tab-active");
        nowType = this.dataset.type;
        renderFood();
    })
})

// 渲染菜單
function renderFood(){
    let html = "";
    let list = foodData.filter(item=>item.type === nowType);
    list.forEach(f=>{
        html += `
        <div class="food-item" onclick="openFoodDetail(${f.id})">
            <img src="${f.img}" class="food-img">
            <div class="food-info">
                <div class="food-name">${f.name}</div>
                <div class="food-price">$${f.price}</div>
                <div class="food-desc">${f.desc}</div>
            </div>
            <div class="add-btn" onclick="event.stopPropagation();openTasteSelect(${f.id})">
                <i class="fa fa-plus-circle"></i>
            </div>
        </div>
        `
    })
    document.getElementById("foodList").innerHTML = html;
}

// 開啟菜品詳情
function openFoodDetail(id){
    let food = foodData.find(v=>v.id === id);
    nowFood = food;
    document.getElementById("modalImg").src = food.img;
    document.getElementById("modalName").innerText = food.name;
    document.getElementById("modalPrice").innerText = "售價：$"+food.price;
    document.getElementById("modalDesc").innerText = food.desc;
    document.getElementById("foodModal").style.display = "flex";
}
function closeFoodModal(){
    document.getElementById("foodModal").style.display = "none";
}
function addCartFromModal(){
    closeFoodModal();
    openTasteSelect(nowFood.id);
}

// 口味選擇彈窗
function openTasteSelect(id){
    nowFood = foodData.find(v=>v.id === id);
    document.getElementById("tasteModal").style.display = "flex";
}
function closeTasteModal(){
    document.getElementById("tasteModal").style.display = "none";
}

// 確認加入購物車
function confirmAddCart(){
    let taste = document.querySelector('input[name="taste"]:checked').value;
    let exist = cart.find(v=>v.id === nowFood.id && v.taste === taste);
    if(exist){
        exist.num += 1;
    }else{
        cart.push({
            id:nowFood.id,
            name:nowFood.name,
            price:nowFood.price,
            taste:taste,
            num:1,
            img:nowFood.img
        })
    }
    closeTasteModal();
    updateCartCount();
    alert("已加入："+nowFood.name+" - "+taste);
}

// 更新購物車數量
function updateCartCount(){
    let total = 0;
    cart.forEach(item=>total += item.num);
    document.getElementById("cartNum").innerText = total;
}

// 開啟購物車
function openCart(){
    let html = "";
    let totalMoney = 0;
    if(cart.length <= 0){
        html = '<p style="text-align:center;color:#999;padding:30px 0;">購物車尚無餐點</p>';
    }else{
        cart.forEach((item,idx)=>{
            totalMoney += item.price * item.num;
            html += `
            <div class="cart-row">
                <img src="${item.img}" class="cart-img">
                <div style="flex:1;">
                    <p style="font-size:14px;">${item.name}</p>
                    <p style="font-size:12px;color:#777;">口味：${item.taste}</p>
                    <p style="color:var(--main);margin-top:4px;">$${item.price}</p>
                </div>
                <div>
                    <span class="num-btn" onclick="cartMinus(${idx})">-</span>
                    <span style="margin:0 8px;">${item.num}</span>
                    <span class="num-btn" onclick="cartPlus(${idx})">+</span>
                </div>
            </div>
            `
        })
    }
    document.getElementById("cartList").innerHTML = html;
    document.getElementById("totalPrice").innerText = "$"+totalMoney;
    document.getElementById("cartModal").style.display = "flex";
}
function closeCart(){
    document.getElementById("cartModal").style.display = "none";
}
function cartPlus(idx){
    cart[idx].num++;
    openCart();
    updateCartCount();
}
function cartMinus(idx){
    if(cart[idx].num <= 1){
        cart.splice(idx,1);
    }else{
        cart[idx].num--;
    }
    openCart();
    updateCartCount();
}

// 初始載入
renderFood();
</script>
</body>
</html>
