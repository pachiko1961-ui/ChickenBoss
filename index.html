<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>雞老闆輕食料理 - 線上點餐</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        *{box-sizing:border-box;}
        body{background-color:#fef3c7;font-family:system-ui,sans-serif;margin:0;padding:0;}
        .max-w-5xl{max-width:1200px;margin:0 auto;padding:1rem;}
        .bg-orange-600{background-color:#ea580c;}
        .text-white{color:#fff;}
        .rounded-xl{border-radius:1rem;}
        .p-4{padding:1rem;}
        .mb-4{margin-bottom:1rem;}
        .text-center{text-align:center;}
        .text-2xl{font-size:1.5rem;}
        .font-bold{font-weight:bold;}
        .bg-white{background:#fff;}
        .shadow{box-shadow:0 2px 8px #00000015;}
        .grid{display:grid;}
        .grid-cols-3{grid-template-columns:repeat(3,1fr);}
        .gap-3{gap:0.75rem;}
        .border{border:1px solid #ddd;}
        .rounded-lg{border-radius:0.5rem;}
        .p-3{padding:0.75rem;}
        .cursor-pointer{cursor:pointer;}
        .text-sm{font-size:0.875rem;}
        .text-gray-500{color:#6b7280;}
        .text-red-500{color:#ef4444;}
        .text-red-600{color:#dc2626;}
        .text-blue-600{color:#2563eb;}
        .bg-blue-100{background:#dbeafe;}
        .hidden{display:none;}
        .meal-active{border:2px solid #f59e0b;background:#fffbeb;}
        .food-item:hover{transform:scale(1.03);transition:0.2s;}
        .bg-red-50{background:#fef2f2;}
        .text-green-600{color:#16a34a;}
        .flex{display:flex;}
        .gap-3{gap:0.75rem;}
        .flex-1{flex:1;}
        .py-3{padding:0.75rem 0;}
        .bg-gray-400{background:#9ca3af;}
        .justify-between{justify-content:space-between;}
        @media (max-width:768px){
            .grid-cols-3{grid-template-columns:1fr;}
            .grid-cols-4{grid-template-columns:repeat(2,1fr);}
            /* 手機版單點菜品改為2列 */
            .single-food-grid{grid-template-columns:repeat(2,1fr)!important;}
        }
        .grid-cols-4{grid-template-columns:repeat(4,1fr);}
        
        /* 新增：彈窗提示樣式 */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            z-index: 9999;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .toast.show {
            opacity: 1;
        }

        /* 新增：點餐類型切換按鈕 */
        .order-type-btn {
            padding: 8px 16px;
            border: 1px solid #ddd;
            background: #fff;
            border-radius: 6px;
            cursor: pointer;
            margin-right: 8px;
        }
        .order-type-btn.active {
            background: #ea580c;
            color: white;
            border-color: #ea580c;
        }

        /* 新增：單點菜品樣式 */
        .single-food-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }
        .category-title {
            font-weight: bold;
            margin: 1rem 0 0.5rem 0;
            color: #ea580c;
            font-size: 1rem;
        }
        .single-food-item {
            padding: 0.5rem;
            border: 1px solid #ddd;
            border-radius: 0.5rem;
            cursor: pointer;
            background: #fff;
            font-size: 0.875rem; /* 縮小菜品按鈕文字 */
        }
        .single-food-item:hover {
            background: #fffbeb;
            border-color: #f59e0b;
        }
        .single-food-price {
            color: #16a34a;
            font-size: 0.75rem; /* 縮小價格文字 */
            margin-top: 0.25rem;
        }
    </style>
</head>
<body>
    <div class="max-w-5xl">
        <!-- 店家資訊 -->
        <div class="bg-orange-600 text-white rounded-xl p-4 mb-4 text-center">
            <h1 class="text-2xl font-bold">雞老闆輕食料理(鹹水雞 & 蔬菜)</h1>
            <p class="mt-1">訂購專線：0989-170-661 | 地址：三民街161號</p>
        </div>

        <!-- 新增：點餐類型切換 -->
        <div class="bg-white rounded-xl p-4 shadow mb-4">
            <h2 class="font-bold text-lg mb-3">📋 點餐類型</h2>
            <div>
                <button class="order-type-btn active" onclick="switchOrderType('meal')">套餐點餐</button>
                <button class="order-type-btn" onclick="switchOrderType('single')">單點選項</button>
            </div>
        </div>

        <!-- 套餐選擇 (預設顯示) -->
        <div id="mealSection" class="bg-white rounded-xl p-4 shadow mb-4">
            <h2 class="font-bold text-lg mb-3">🍱 選擇套餐</h2>
            <div class="grid grid-cols-3 gap-3">
                <div class="meal-item border rounded-lg p-3 cursor-pointer text-center" data-type="smallBamboo" data-num="0" data-price="125">
                    <div class="font-semibold">小筍餐</div>
                    <div class="text-sm text-gray-500">半雞+脆筍1份</div>
                    <div class="text-red-500 font-bold">$125</div>
                </div>
                <div class="meal-item border rounded-lg p-3 cursor-pointer text-center" data-type="family" data-num="7" data-price="300">
                    <div class="font-semibold">全家餐</div>
                    <div class="text-sm text-gray-500">全雞+任選7種小菜</div>
                    <div class="text-red-500 font-bold">$300</div>
                </div>
                <div class="meal-item border rounded-lg p-3 cursor-pointer text-center" data-type="smallSet" data-num="4" data-price="175">
                    <div class="font-semibold">小套餐</div>
                    <div class="text-sm text-gray-500">全雞+任選4種小菜</div>
                    <div class="text-red-500 font-bold">$175</div>
                </div>
            </div>
            <p class="text-sm text-red-600 mt-2">⚠️ 限點20元以內小菜，超過20元需補差價</p>
        </div>

        <!-- 新增：單點區域 (預設隱藏) -->
        <div id="singleSection" class="bg-white rounded-xl p-4 shadow mb-4 hidden">
            <h2 class="font-bold text-lg mb-3">🍴 單點選項</h2>
            <p class="text-sm text-gray-500 mb-3">可自由選擇多種食材，無數量限制</p>
            <!-- 單點菜品容器 (動態生成) -->
            <div id="singleFoodContainer"></div>
        </div>

        <!-- 選品提示 -->
        <div id="tipBox" class="hidden bg-blue-100 rounded p-3 mb-4">
            <span id="tipText"></span>
            <button onclick="closeTip()" class="ml-3 text-blue-600">關閉</button>
        </div>

        <!-- 商品分類選單 (套餐模式用) -->
        <div id="mealFoodSection" class="bg-white rounded-xl p-4 shadow mb-4">
            <h2 class="font-bold text-lg mb-3">🥬 挑選食材</h2>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-3" id="foodList"></div>
        </div>

        <!-- 已選清單 -->
        <div class="bg-white rounded-xl p-4 shadow mb-4">
            <h2 class="font-bold text-lg mb-3">🛒 已選菜品</h2>
            <div id="selectList" class="mb-3 text-sm"></div>
            <div class="flex justify-between font-bold">
                <span>套餐金額：<span id="mealPrice">0</span> 元</span>
                <span>補差價總計：<span id="diffPrice">0</span> 元</span>
                <span class="text-red-600">應付總金額：<span id="allPrice">0</span> 元</span>
            </div>
        </div>

        <!-- 結帳按鈕 -->
        <div class="flex gap-3">
            <button onclick="clearSelect()" class="flex-1 bg-gray-400 text-white py-3 rounded-xl">清空選擇</button>
            <button onclick="submitOrder()" class="flex-1 bg-orange-600 text-white py-3 rounded-xl font-bold">確認結帳送出訂單</button>
        </div>
    </div>

    <!-- 新增：彈窗提示容器 -->
    <div id="toast" class="toast">已加入購物車</div>

    <script>
        // Supabase 設定
        const SUPABASE_URL = "https://zexwhzgxunfnbschkizq.supabase.co";
        const SUPABASE_KEY = "sb_publishable_OPftLOAUJFzwKZ8eK7GIXg_2LEEMMwn";
        const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let selectMeal = null;
        let needSelectNum = 0;
        let selectFoodArr = [];
        let baseMealPrice = 0;
        let totalDiff = 0;
        // 新增：當前點餐類型 (meal=套餐, single=單點)
        let currentOrderType = 'meal';
        // 儲存所有菜品資料 (含分類)
        let allFoodData = [];

        // 新增：彈窗提示函數
        function showToast(message = '已加入購物車') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 1000); // 1秒後自動關閉
        }

        // 新增：切換點餐類型
        function switchOrderType(type) {
            currentOrderType = type;
            // 切換按鈕狀態
            document.querySelectorAll('.order-type-btn').forEach(btn => {
                btn.classList.toggle('active', btn.getAttribute('onclick').includes(type));
            });
            // 切換區域顯示
            document.getElementById('mealSection').classList.toggle('hidden', type === 'single');
            document.getElementById('singleSection').classList.toggle('hidden', type === 'meal');
            document.getElementById('mealFoodSection').classList.toggle('hidden', type === 'single');
            // 重置選擇
            clearSelect();
            // 單點模式隱藏提示框
            if (type === 'single') {
                closeTip();
                // 載入單點菜品 (含分類)
                loadSingleFoodByCategory();
            }
        }

        // 關閉提示
        function closeTip(){
            document.getElementById('tipBox').classList.add('hidden');
        }

        // 清空選擇
        function clearSelect(){
            selectFoodArr = [];
            selectMeal = null;
            needSelectNum = 0;
            baseMealPrice = 0;
            document.querySelectorAll('.meal-item').forEach(i=>i.classList.remove('meal-active'));
            calcPrice();
            renderSelectList();
            closeTip();
        }

        // 套餐選擇
        document.querySelectorAll('.meal-item').forEach(item=>{
            item.addEventListener('click',()=>{
                if (currentOrderType !== 'meal') return; // 非套餐模式不執行
                document.querySelectorAll('.meal-item').forEach(i=>i.classList.remove('meal-active'));
                item.classList.add('meal-active');
                selectMeal = item.dataset.type;
                needSelectNum = parseInt(item.dataset.num);
                baseMealPrice = parseInt(item.dataset.price);
                selectFoodArr = [];
                calcPrice();
                renderSelectList();
                if(needSelectNum > 0){
                    document.getElementById('tipBox').classList.remove('hidden');
                    document.getElementById('tipText').innerText=`請再選 ${needSelectNum} 樣小菜完成點餐`;
                }else{
                    closeTip();
                }
            })
        });

        // 載入套餐模式菜品
        async function loadMealFood(){
            const {data} = await client.from('food_product').select('*');
            allFoodData = data || []; // 儲存所有菜品資料
            const box = document.getElementById('foodList');
            box.innerHTML = '';
            allFoodData.forEach(food=>{
                let isOver = food.price > 20;
                let html = `
                <div class="food-item border rounded p-2 cursor-pointer ${isOver?'bg-red-50':''}" onclick="chooseFood(${food.id},'${food.name}',${food.price})">
                    <div>${food.name}</div>
                    <div class="text-sm ${isOver?'text-red-500':'text-green-600'}">${food.price}元 ${isOver?'(補差價)':''}</div>
                </div>
                `;
                box.innerHTML += html;
            })
        }

        // 載入單點模式菜品 (依分類歸類)
        function loadSingleFoodByCategory() {
            const container = document.getElementById('singleFoodContainer');
            container.innerHTML = '';
            
            // 若無菜品資料則先載入
            if (allFoodData.length === 0) {
                loadMealFood().then(() => {
                    renderSingleFoodByCategory();
                });
                return;
            }
            
            renderSingleFoodByCategory();
        }

        // 渲染單點模式菜品 (依分類歸類)
        function renderSingleFoodByCategory() {
            const container = document.getElementById('singleFoodContainer');
            container.innerHTML = '';

            // 分類整理菜品 (這裡假設food_product有category欄位，若沒有請根據實際欄位調整)
            // 若資料庫沒有分類欄位，可手動建立分類規則，例如：
            const categoryMap = {
                '經典小菜': [],
                '蔬菜類': [],
                '特製配料': [],
                '其他': []
            };

            // 將菜品分類 (這裡示範根據名稱關鍵字分類，可根據實際category欄位調整)
            allFoodData.forEach(food => {
                if (['筍', '海帶', '豆干', '貢丸'].some(key => food.name.includes(key))) {
                    categoryMap['經典小菜'].push(food);
                } else if (['菜', '菇', '瓜', '筊白筍', '番茄'].some(key => food.name.includes(key))) {
                    categoryMap['蔬菜類'].push(food);
                } else if (['辣', '醬', '油'].some(key => food.name.includes(key))) {
                    categoryMap['特製配料'].push(food);
                } else {
                    categoryMap['其他'].push(food);
                }
            });

            // 渲染每個分類的菜品
            Object.keys(categoryMap).forEach(category => {
                const foods = categoryMap[category];
                if (foods.length === 0) return;

                // 建立分類標題
                const categoryTitle = document.createElement('div');
                categoryTitle.className = 'category-title';
                categoryTitle.textContent = category;
                container.appendChild(categoryTitle);

                // 建立菜品網格
                const foodGrid = document.createElement('div');
                foodGrid.className = 'single-food-grid';
                container.appendChild(foodGrid);

                // 渲染該分類下的菜品
                foods.forEach(food => {
                    const foodItem = document.createElement('div');
                    foodItem.className = 'single-food-item';
                    foodItem.innerHTML = `
                        <div>${food.name}</div>
                        <div class="single-food-price">${food.price}元</div>
                    `;
                    foodItem.onclick = () => chooseFood(food.id, food.name, food.price);
                    foodGrid.appendChild(foodItem);
                });
            });
        }

        // 選擇食材 (支援套餐/單點模式)
        function chooseFood(id,name,price){
            // 套餐模式：必須先選套餐
            if (currentOrderType === 'meal' && !selectMeal) {
                alert('請先選擇套餐');
                return;
            }
            
            // 套餐模式：檢查數量限制
            if (currentOrderType === 'meal' && needSelectNum>0 && selectFoodArr.length >= needSelectNum) {
                alert(`此套餐僅可選${needSelectNum}樣小菜`);
                return;
            }
            
            // 檢查是否已選擇
            let exist = selectFoodArr.find(item=>item.id===id);
            if(exist) {
                showToast('已選擇過此食材');
                return;
            }
            
            // 加入購物車
            selectFoodArr.push({id,name,price});
            calcPrice();
            renderSelectList();
            // 顯示彈窗提示
            showToast(`已加入 ${name}`);
        }

        // 計算金額 (支援套餐/單點模式)
        function calcPrice(){
            totalDiff = 0;
            
            if (currentOrderType === 'meal') {
                // 套餐模式：計算補差價
                selectFoodArr.forEach(item=>{
                    if(item.price>20) totalDiff += (item.price-20);
                })
            } else {
                // 單點模式：直接計算食材總價，無套餐金額和差價
                baseMealPrice = 0;
                totalDiff = 0;
                selectFoodArr.forEach(item=>{
                    baseMealPrice += item.price;
                })
            }
            
            let all = baseMealPrice + totalDiff;
            document.getElementById('mealPrice').innerText = currentOrderType === 'meal' ? baseMealPrice : 0;
            document.getElementById('diffPrice').innerText = totalDiff;
            document.getElementById('allPrice').innerText = all;
        }

        // 渲染已選清單
        function renderSelectList(){
            let html = '';
            selectFoodArr.forEach((item,idx)=>{
                let diff = '';
                // 單點模式不顯示補差價提示
                if (currentOrderType === 'meal' && item.price>20) {
                    diff = `(補${item.price-20}元)`;
                }
                html += `<div>${idx+1}. ${item.name} ${item.price}元 ${diff} <button onclick="delFood(${item.id})" style="color:#ef4444;border:none;background:none;cursor:pointer;">移除</button></div>`;
            })
            document.getElementById('selectList').innerHTML = html || '尚未選擇食材';
        }

        // 移除食材
        function delFood(id){
            selectFoodArr = selectFoodArr.filter(item=>item.id!==id);
            calcPrice();
            renderSelectList();
            showToast('已移除選項');
        }

        // 提交訂單 (支援套餐/單點模式)
        async function submitOrder(){
            // 套餐模式驗證
            if (currentOrderType === 'meal') {
                if(!selectMeal){
                    alert('請選擇套餐');
                    return;
                }
                if(needSelectNum>0 && selectFoodArr.length < needSelectNum){
                    alert(`還需再選${needSelectNum-selectFoodArr.length}樣小菜`);
                    return;
                }
            } 
            // 單點模式驗證
            else {
                if(selectFoodArr.length === 0){
                    alert('請選擇至少一種食材');
                    return;
                }
            }

            let orderNo = 'ORD'+new Date().getTime();
            const {error} = await client.from('order_list').insert([{
                order_no:orderNo,
                order_type: currentOrderType === 'meal' ? selectMeal : 'single',
                select_food:selectFoodArr,
                total_price:baseMealPrice+totalDiff,
                diff_price:totalDiff
            }])
            if(error){
                alert('訂單送出失敗');
                console.log(error);
            }else{
                alert(`訂單已送出，店家已收到！\n訂單編號：${orderNo}`);
                clearSelect();
            }
        }

        // 初始化載入
        loadMealFood();
    </script>
</body>
</html>
