<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>雞老闆輕食料理 - 線上點餐</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        *{box-sizing:border-box;}
        body{background-color:#fef3c7;font-family:system-ui,sans-serif;margin:0;padding:0;}
        .max-w-5xl{max-width:1200px;margin:0 auto;padding:1rem;}
        .bg-orange-600{background-color:#ea580c;}
        .text-white{color:#fff;}
        .rounded-xl{border-radius:1rem;}
        .p-4{padding:1rem;}
        .mb-4{margin-bottom:1rem;}
        .text-center{text-align:center;}
        .text-2xl{font-size:1.5rem;}
        .font-bold{font-weight:bold;}
        .bg-white{background:#fff;}
        .shadow{box-shadow:0 2px 8px #00000015;}
        .grid{display:grid;}
        .grid-cols-3{grid-template-columns:repeat(3,1fr);}
        .gap-3{gap:0.75rem;}
        .border{border:1px solid #ddd;}
        .rounded-lg{border-radius:0.5rem;}
        .p-3{padding:0.75rem;}
        .cursor-pointer{cursor:pointer;}
        .text-sm{font-size:0.875rem;}
        .text-gray-500{color:#6b7280;}
        .text-red-500{color:#ef4444;}
        .text-red-600{color:#dc2626;}
        .text-blue-600{color:#2563eb;}
        .bg-blue-100{background:#dbeafe;}
        .hidden{display:none;}
        .meal-active{border:2px solid #f59e0b;background:#fffbeb;}
        .food-item:hover{transform:scale(1.03);transition:0.2s;}
        .bg-red-50{background:#fef2f2;}
        .text-green-600{color:#16a34a;}
        .flex{display:flex;}
        .gap-3{gap:0.75rem;}
        .flex-1{flex:1;}
        .py-3{padding:0.75rem 0;}
        .bg-gray-400{background:#9ca3af;}
        .justify-between{justify-content:space-between;}
        @media (max-width:768px){
            .grid-cols-3{grid-template-columns:1fr;}
            .grid-cols-4{grid-template-columns:repeat(2,1fr);}
        }
        .grid-cols-4{grid-template-columns:repeat(4,1fr);}
    </style>
</head>
<body>
    <div class="max-w-5xl">
        <!-- 店家資訊 -->
        <div class="bg-orange-600 text-white rounded-xl p-4 mb-4 text-center">
            <h1 class="text-2xl font-bold">雞老闆輕食料理(鹹水雞 & 蔬菜)</h1>
            <p class="mt-1">訂購專線：0989-170-661 | 地址：三民街161號</p>
        </div>

        <!-- 套餐選擇 -->
        <div class="bg-white rounded-xl p-4 shadow mb-4">
            <h2 class="font-bold text-lg mb-3">🍱 選擇套餐</h2>
            <div class="grid grid-cols-3 gap-3">
                <div class="meal-item border rounded-lg p-3 cursor-pointer text-center" data-type="smallBamboo" data-num="0" data-price="125">
                    <div class="font-semibold">小筍餐</div>
                    <div class="text-sm text-gray-500">半雞+脆筍1份</div>
                    <div class="text-red-500 font-bold">$125</div>
                </div>
                <div class="meal-item border rounded-lg p-3 cursor-pointer text-center" data-type="family" data-num="7" data-price="300">
                    <div class="font-semibold">全家餐</div>
                    <div class="text-sm text-gray-500">全雞+任選7種小菜</div>
                    <div class="text-red-500 font-bold">$300</div>
                </div>
                <div class="meal-item border rounded-lg p-3 cursor-pointer text-center" data-type="smallSet" data-num="4" data-price="175">
                    <div class="font-semibold">小套餐</div>
                    <div class="text-sm text-gray-500">全雞+任選4種小菜</div>
                    <div class="text-red-500 font-bold">$175</div>
                </div>
            </div>
            <p class="text-sm text-red-600 mt-2">⚠️ 限點20元以內小菜，超過20元需補差價</p>
        </div>

        <!-- 選品提示 -->
        <div id="tipBox" class="hidden bg-blue-100 rounded p-3 mb-4">
            <span id="tipText"></span>
            <button onclick="closeTip()" class="ml-3 text-blue-600">關閉</button>
        </div>

        <!-- 商品分類選單 -->
        <div class="bg-white rounded-xl p-4 shadow mb-4">
            <h2 class="font-bold text-lg mb-3">🥬 挑選食材</h2>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-3" id="foodList"></div>
        </div>

        <!-- 已選清單 -->
        <div class="bg-white rounded-xl p-4 shadow mb-4">
            <h2 class="font-bold text-lg mb-3">🛒 已選菜品</h2>
            <div id="selectList" class="mb-3 text-sm"></div>
            <div class="flex justify-between font-bold">
                <span>套餐金額：<span id="mealPrice">0</span> 元</span>
                <span>補差價總計：<span id="diffPrice">0</span> 元</span>
                <span class="text-red-600">應付總金額：<span id="allPrice">0</span> 元</span>
            </div>
        </div>

        <!-- 結帳按鈕 -->
        <div class="flex gap-3">
            <button onclick="clearSelect()" class="flex-1 bg-gray-400 text-white py-3 rounded-xl">清空選擇</button>
            <button onclick="submitOrder()" class="flex-1 bg-orange-600 text-white py-3 rounded-xl font-bold">確認結帳送出訂單</button>
        </div>
    </div>

    <script>
        // Supabase 設定
        const SUPABASE_URL = "https://zexwhzgxunfnbschkizq.supabase.co";
        const SUPABASE_KEY = "sb_publishable_OPftLOAUJFzwKZ8eK7GIXg_2LEEMMwn";
        const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let selectMeal = null;
        let needSelectNum = 0;
        let selectFoodArr = [];
        let baseMealPrice = 0;
        let totalDiff = 0;

        // 關閉提示
        function closeTip(){
            document.getElementById('tipBox').classList.add('hidden');
        }

        // 清空選擇
        function clearSelect(){
            selectFoodArr = [];
            selectMeal = null;
            needSelectNum = 0;
            baseMealPrice = 0;
            document.querySelectorAll('.meal-item').forEach(i=>i.classList.remove('meal-active'));
            calcPrice();
            renderSelectList();
            closeTip();
        }

        // 套餐選擇
        document.querySelectorAll('.meal-item').forEach(item=>{
            item.addEventListener('click',()=>{
                document.querySelectorAll('.meal-item').forEach(i=>i.classList.remove('meal-active'));
                item.classList.add('meal-active');
                selectMeal = item.dataset.type;
                needSelectNum = parseInt(item.dataset.num);
                baseMealPrice = parseInt(item.dataset.price);
                selectFoodArr = [];
                calcPrice();
                renderSelectList();
                if(needSelectNum > 0){
                    document.getElementById('tipBox').classList.remove('hidden');
                    document.getElementById('tipText').innerText=`請再選 ${needSelectNum} 樣小菜完成點餐`;
                }else{
                    closeTip();
                }
            })
        });

        // 載入商品
        async function loadFood(){
            const {data} = await client.from('food_product').select('*');
            const box = document.getElementById('foodList');
            box.innerHTML = '';
            data.forEach(food=>{
                let isOver = food.price > 20;
                let html = `
                <div class="food-item border rounded p-2 cursor-pointer ${isOver?'bg-red-50':''}" onclick="chooseFood(${food.id},'${food.name}',${food.price})">
                    <div>${food.name}</div>
                    <div class="text-sm ${isOver?'text-red-500':'text-green-600'}">${food.price}元 ${isOver?'(補差價)':''}</div>
                </div>
                `;
                box.innerHTML += html;
            })
        }

        // 選擇食材
        function chooseFood(id,name,price){
            if(!selectMeal){alert('請先選擇套餐');return;}
            if(needSelectNum>0 && selectFoodArr.length >= needSelectNum){
                alert(`此套餐僅可選${needSelectNum}樣小菜`);
                return;
            }
            let exist = selectFoodArr.find(item=>item.id===id);
            if(exist) return;
            selectFoodArr.push({id,name,price});
            calcPrice();
            renderSelectList();
        }

        // 計算金額與差價
        function calcPrice(){
            totalDiff = 0;
            selectFoodArr.forEach(item=>{
                if(item.price>20) totalDiff += (item.price-20);
            })
            let all = baseMealPrice + totalDiff;
            document.getElementById('mealPrice').innerText = baseMealPrice;
            document.getElementById('diffPrice').innerText = totalDiff;
            document.getElementById('allPrice').innerText = all;
        }

        // 渲染已選清單
        function renderSelectList(){
            let html = '';
            selectFoodArr.forEach((item,idx)=>{
                let diff = item.price>20 ? `(補${item.price-20}元)`:'';
                html += `<div>${idx+1}. ${item.name} ${item.price}元 ${diff} <button onclick="delFood(${item.id})" style="color:#ef4444;border:none;background:none;cursor:pointer;">移除</button></div>`;
            })
            document.getElementById('selectList').innerHTML = html || '尚未選擇食材';
        }

        // 移除食材
        function delFood(id){
            selectFoodArr = selectFoodArr.filter(item=>item.id!==id);
            calcPrice();
            renderSelectList();
        }

        // 提交訂單
        async function submitOrder(){
            if(!selectMeal){alert('請選擇套餐');return;}
            if(needSelectNum>0 && selectFoodArr.length < needSelectNum){
                alert(`還需再選${needSelectNum-selectFoodArr.length}樣小菜`);
                return;
            }
            let orderNo = 'ORD'+new Date().getTime();
            const {error} = await client.from('order_list').insert([{
                order_no:orderNo,
                order_type:selectMeal,
                select_food:selectFoodArr,
                total_price:baseMealPrice+totalDiff,
                diff_price:totalDiff
            }])
            if(error){
                alert('訂單送出失敗');
                console.log(error);
            }else{
                alert('訂單已送出，店家已收到！');
                clearSelect();
            }
        }

        // 初始化載入
        loadFood();
    </script>
</body>
</html>
