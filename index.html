<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>雞老闆輕食料理 - 線上點餐</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
    --main:#e63946;
    --light:#fff5f5;
    --dark:#2d3748;
    --gray:#f3f4f6;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#f3f4f6;font-family:Microsoft JhengHei,sans-serif;padding-bottom:80px;}
.header{background:var(--main);color:#fff;text-align:center;padding:16px 0;box-shadow:0 2px 6px #0002;position:sticky;top:0;z-index:30;}
.header h1{font-size:20px;font-weight:bold;}
.header p{font-size:13px;opacity:0.9;margin-top:4px;}
.tab-wrap{display:flex;overflow-x:auto;background:#fff;position:sticky;top:60px;z-index:20;box-shadow:0 1px 3px #0001;}
.tab-item{white-space:nowrap;padding:12px 16px;font-size:14px;color:#666;cursor:pointer;}
.tab-active{border-bottom:3px solid var(--main);color:var(--main);font-weight:bold;}
.container{padding:12px;}
.food-item{background:#fff;border-radius:12px;padding:12px;margin-bottom:12px;display:flex;box-shadow:0 1px 4px #0001;}
.food-item:active{transform:scale(0.98);transition:0.2s;}
.food-img{width:80px;height:80px;border-radius:8px;object-fit:cover;}
.food-info{flex:1;margin-left:12px;}
.food-name{font-weight:bold;font-size:15px;}
.food-price{color:var(--main);font-weight:bold;margin:4px 0;}
.food-desc{font-size:12px;color:#999;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.food-remark{font-size:11px;color:#888;margin-top:2px;}
.add-btn{align-self:center;font-size:22px;color:var(--main);cursor:pointer;}
.modal{position:fixed;inset:0;background:rgba(0,0,0.6);z-index:50;display:none;align-items:center;justify-content:center;padding:16px;}
.modal-box{background:#fff;border-radius:12px;width:100%;max-width:360px;overflow:hidden;animation:fadeIn 0.2s;}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
.cart-modal{align-items:flex-end;}
.cart-content{background:#fff;width:100%;border-radius:20px 20px 0 0;padding:16px;max-height:70vh;overflow-y:auto;}
.taste-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:16px 0;}
.taste-label{border:1px solid #ddd;border-radius:8px;padding:12px;text-align:center;cursor:pointer;}
.btn{padding:10px;border-radius:8px;border:none;cursor:pointer;font-size:14px;}
.btn-gray{border:1px solid #ddd;background:#fff;}
.btn-red{background:var(--main);color:#fff;}
.btn-green{background:#28a745;color:#fff;}
.cart-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid #eee;}
.cart-img{width:56px;height:56px;border-radius:6px;object-fit:cover;}
.num-btn{width:26px;height:26px;border:1px solid #ccc;border-radius:4px;text-align:center;line-height:26px;display:inline-block;cursor:pointer;}
.footer-cart{position:fixed;bottom:0;left:0;width:100%;background:#fff;border-top:1px solid #eee;display:flex;align-items:center;justify-content:space-between;padding:12px 16px;z-index:40;}
.cart-badge{color:var(--main);font-weight:bold;}
.go-cart{background:var(--main);color:#fff;padding:8px 20px;border-radius:20px;font-size:14px;}
.order-textarea{
    width:100%;
    height:160px;
    border:1px solid #ddd;
    border-radius:8px;
    padding:10px;
    font-size:13px;
    white-space:pre-wrap;
    resize:none;
    margin:10px 0;
}
</style>
</head>
<body>
<div class="header">
    <h1>雞老闆輕食料理</h1>
    <p>掃碼快速點餐 · 新鮮現做</p>
</div>

<div class="tab-wrap" id="cateTab"></div>
<div class="container" id="foodList"></div>

<div class="footer-cart">
    <div>
        <i class="fa fa-shopping-cart" style="font-size:18px;color:var(--main);"></i>
        <span style="margin-left:6px;">共 <span id="cartNum" class="cart-badge">0</span> 項</span>
    </div>
    <button class="go-cart" onclick="openCart()">查看購物車</button>
</div>

<!-- 菜品詳情彈窗 -->
<div id="foodModal" class="modal">
    <div class="modal-box">
        <img id="modalImg" src="" style="width:100%;height:190px;object-fit:cover;">
        <div style="padding:16px;">
            <h2 id="modalName" style="font-size:17px;font-weight:bold;"></h2>
            <p id="modalPrice" style="color:var(--main);font-weight:bold;margin:6px 0;"></p>
            <p id="modalRemark" style="font-size:13px;color:#777;margin:4px 0;"></p>
            <p id="modalDesc" style="color:#666;font-size:14px;line-height:1.6;"></p>
            <div style="display:flex;gap:10px;margin-top:20px;">
                <button class="btn btn-gray" onclick="closeFoodModal()">關閉</button>
                <button class="btn btn-red" onclick="addCartFromModal()">加入購物車</button>
            </div>
        </div>
    </div>
</div>

<!-- 結帳全域口味彈窗 -->
<div id="globalTasteModal" class="modal">
    <div class="modal-box" style="padding:20px;">
        <h3 style="font-size:16px;font-weight:bold;">選擇整單統一口味</h3>
        <p style="font-size:12px;color:#777;margin:6px 0;">所有餐點將使用相同口味</p>
        <div class="taste-grid">
            <label class="taste-label"><input type="radio" name="globalTaste" value="原味" checked> 原味</label>
            <label class="taste-label"><input type="radio" name="globalTaste" value="蒜味"> 蒜味</label>
            <label class="taste-label"><input type="radio" name="globalTaste" value="椒麻"> 椒麻</label>
            <label class="taste-label"><input type="radio" name="globalTaste" value="泰式"> 泰式</label>
            <label class="taste-label" style="grid-column:1/3;"><input type="radio" name="globalTaste" value="檸檬"> 檸檬</label>
        </div>
        <div style="display:flex;gap:10px;margin-top:10px;">
            <button class="btn btn-gray" onclick="closeGlobalTaste()">返回購物車</button>
            <button class="btn btn-red" onclick="showOrderList()">確認產生訂單</button>
        </div>
    </div>
</div>

<!-- 完整訂單清單 + 複製按鈕彈窗 -->
<div id="orderModal" class="modal">
    <div class="modal-box" style="padding:20px;max-width:400px;">
        <h3 style="font-size:16px;font-weight:bold;text-align:center;">✅ 訂單明細</h3>
        <textarea id="orderText" class="order-textarea" readonly></textarea>
        <div style="display:flex;gap:10px;">
            <button class="btn btn-green" style="flex:1;" onclick="copyOrderText()">複製訂單</button>
            <button class="btn btn-gray" style="flex:1;" onclick="closeOrderModal()">關閉</button>
        </div>
    </div>
</div>

<!-- 購物車彈窗 -->
<div id="cartModal" class="modal cart-modal">
    <div class="cart-content">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;">
            <h3 style="font-size:16px;font-weight:bold;">我的餐點</h3>
            <i class="fa fa-times" style="font-size:18px;cursor:pointer;" onclick="closeCart()"></i>
        </div>
        <div id="cartList"></div>
        <div style="border-top:1px solid #eee;padding-top:15px;margin-top:15px;">
            <div style="display:flex;justify-content:space-between;margin-bottom:15px;">
                <span>總金額</span>
                <span id="totalPrice" style="font-size:17px;color:var(--main);font-weight:bold;">$0</span>
            </div>
            <button class="btn btn-red" style="width:100%;padding:12px;" onclick="openGlobalTaste()">立即結帳</button>
        </div>
    </div>
</div>

<script>
// ========== 填入你的 Supabase 資訊 ==========
const SUPABASE_URL = "https://zexwhzgxunfnbschkizq.supabase.co";
const SUPABASE_KEY = "sb_publishable_OPftLOAUJFzwKZ8eK7GIXg_2LEEMMwn";
// ===========================================
const sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
let cateList = [];
let foodList = [];
let nowCateId = 1;
let nowFood = null;
let cart = [];
let currentTaste = "";

// 載入分類
async function loadCategory(){
    const {data} = await sbClient.from("food_category").select("*").order("sort");
    cateList = data;
    let html = "";
    data.forEach((item,idx)=>{
        html += `<div class="tab-item ${idx===0?'tab-active':''}" data-cid="${item.id}" onclick="switchCate(${item.id},this)">${item.name}</div>`;
    })
    document.getElementById("cateTab").innerHTML = html;
    if(data.length>0) loadFood(data[0].id);
}
function switchCate(cid,dom){
    document.querySelectorAll(".tab-item").forEach(t=>t.classList.remove("tab-active"));
    dom.classList.add("tab-active");
    nowCateId = cid;
    loadFood(cid);
}
// 載入菜品
async function loadFood(cateId){
    const {data} = await sbClient
        .from("food_product")
        .select("*")
        .eq("cate_id",cateId)
        .eq("status",true)
        .order("sort");
    foodList = data;
    let html = "";
    data.forEach(f=>{
        html += `
        <div class="food-item" onclick="openFoodDetail(${f.id})">
            <img src="${f.image_url||'https://picsum.photos/400/300'}" class="food-img">
            <div class="food-info">
                <div class="food-name">${f.name}</div>
                <div class="food-price">$${f.price}</div>
                <div class="food-desc">${f.description||''}</div>
                <div class="food-remark">備註：${f.remark||'無'}</div>
            </div>
            <div class="add-btn" onclick="event.stopPropagation();addCartDirect(${f.id})">
                <i class="fa fa-plus-circle"></i>
            </div>
        </div>
        `
    })
    document.getElementById("foodList").innerHTML = html;
}
// 開菜品詳細彈窗
function openFoodDetail(fid){
    let food = foodList.find(v=>v.id===fid);
    nowFood = food;
    document.getElementById("modalImg").src = food.image_url||'https://picsum.photos/400/300';
    document.getElementById("modalName").innerText = food.name;
    document.getElementById("modalPrice").innerText = "售價：$"+food.price;
    document.getElementById("modalRemark").innerText = "備註："+(food.remark||"無");
    document.getElementById("modalDesc").innerText = food.description||"無介紹";
    document.getElementById("foodModal").style.display = "flex";
}
function closeFoodModal(){
    document.getElementById("foodModal").style.display = "none";
}
// 直接加入購物車
function addCartDirect(fid){
    let food = foodList.find(v=>v.id===fid);
    let exist = cart.find(item=>item.id === food.id);
    if(exist){
        exist.num += 1;
    }else{
        cart.push({
            id:food.id,
            name:food.name,
            price:food.price,
            num:1,
            img:food.image_url
        })
    }
    updateCartNum();
    alert(`已加入【${food.name}】，結帳時統一選擇整單口味`);
}
// 詳情頁加入購物車
function addCartFromModal(){
    closeFoodModal();
    addCartDirect(nowFood.id);
}
// 更新購物車數量
function updateCartNum(){
    let total = cart.reduce((sum,item)=>sum + item.num,0);
    document.getElementById("cartNum").innerText = total;
}
// 開購物車
function openCart(){
    let html = "";
    let totalMoney = 0;
    if(cart.length <= 0){
        html = '<p style="text-align:center;color:#999;padding:40px 0;">購物車尚無餐點，請先加購商品</p>';
    }else{
        cart.forEach((item,idx)=>{
            totalMoney += item.price * item.num;
            html += `
            <div class="cart-row">
                <img src="${item.img||'https://picsum.photos/400/300'}" class="cart-img">
                <div style="flex:1;">
                    <p>${item.name}</p>
                    <p style="color:var(--main);">$${item.price}</p>
                </div>
                <div>
                    <span class="num-btn" onclick="cartMinus(${idx})">-</span>
                    <span style="margin:0 8px;">${item.num}</span>
                    <span class="num-btn" onclick="cartPlus(${idx})">+</span>
                </div>
            </div>
            `
        })
    }
    document.getElementById("cartList").innerHTML = html;
    document.getElementById("totalPrice").innerText = "$" + totalMoney;
    document.getElementById("cartModal").style.display = "flex";
}
function closeCart(){
    document.getElementById("cartModal").style.display = "none";
}
// 數量增減
function cartPlus(idx){
    cart[idx].num++;
    openCart();
    updateCartNum();
}
function cartMinus(idx){
    if(cart[idx].num <= 1){
        cart.splice(idx,1);
    }else{
        cart[idx].num--;
    }
    openCart();
    updateCartNum();
}
// 開口味選擇彈窗
function openGlobalTaste(){
    if(cart.length === 0){
        alert("購物車沒有商品，無法結帳");
        return;
    }
    closeCart();
    document.getElementById("globalTasteModal").style.display = "flex";
}
function closeGlobalTaste(){
    document.getElementById("globalTasteModal").style.display = "none";
}
// 產生完整訂單文字並彈窗
function showOrderList(){
    currentTaste = document.querySelector('input[name="globalTaste"]:checked').value;
    closeGlobalTaste();

    let totalAll = 0;
    let orderStr = "===============================\n";
    orderStr += "        雞老闆輕食料理\n";
    orderStr += "===============================\n";
    orderStr += `統一整單口味：${currentTaste}\n\n`;
    orderStr += "餐點清單：\n";

    cart.forEach(item=>{
        let sub = item.price * item.num;
        totalAll += sub;
        orderStr += `• ${item.name}  x${item.num}  $${item.price}  小計$${sub}\n`;
    })

    orderStr += `\n===============================\n`;
    orderStr += `訂單總金額：$${totalAll}\n`;
    orderStr += `===============================`;

    // 填入文字框
    document.getElementById("orderText").value = orderStr;
    document.getElementById("orderModal").style.display = "flex";
}
// 複製訂單到剪貼簿
async function copyOrderText(){
    const text = document.getElementById("orderText").value;
    try {
        await navigator.clipboard.writeText(text);
        alert("✅ 訂單已複製到剪貼簿！可貼至LINE/備忘錄");
    } catch(err) {
        alert("❌ 複製失敗，請手動選取文字複製");
    }
}
function closeOrderModal(){
    document.getElementById("orderModal").style.display = "none";
    // 清空購物車（可保留不清除，依需求刪除這兩行）
    cart = [];
    updateCartNum();
}

window.onload=()=>{
    loadCategory();
}
</script>
</body>
</html>
