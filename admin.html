<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>雞老闆後台 - 出菜管理</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.43.0"></script>
    <style>
        body{background:#f3f4f6;margin:0;padding:0;font-family:system-ui,sans-serif;}
        .max-w-6xl{max-width:1400px;margin:0 auto;padding:1rem;}
        .text-2xl{font-size:1.5rem;}
        .font-bold{font-weight:bold;}
        .text-center{text-align:center;}
        .mb-6{margin-bottom:1.5rem;}
        .bg-white{background:#fff;}
        .rounded-xl{border-radius:1rem;}
        .p-4{padding:1rem;}
        .shadow{box-shadow:0 2px 8px #00000015;}
        .mb-4{margin-bottom:1rem;}
        .border{border:1px solid #ddd;}
        .rounded{border-radius:0.5rem;}
        .mb-3{margin-bottom:0.75rem;}
        .mt-1{margin-top:0.25rem;}
        .text-red-600{color:#dc2626;}
        .text-green-600{color:#16a34a;}
        .text-gray-500{color:#6b7280;font-size:0.9rem;}
        .flavor-info{background:#fef3c7;padding:0.5rem;border-radius:0.5rem;margin:0.5rem 0;}
        .order-item{border-left:4px solid #ea580c;padding-left:0.5rem;margin:0.25rem 0;}
        /* 新增按鈕樣式 */
        .btn{
            padding:0.5rem 1rem;
            border:none;
            border-radius:0.5rem;
            cursor:pointer;
            font-weight:bold;
            margin:0 0.5rem 0 0;
        }
        .btn-complete{background:#16a34a;color:white;}
        .btn-complete:hover{background:#15803d;}
        .btn-delete{background:#dc2626;color:white;}
        .btn-delete:hover{background:#b91c1c;}
        .status-tag{
            padding:0.25rem 0.5rem;
            border-radius:0.25rem;
            font-size:0.8rem;
            font-weight:bold;
        }
        .status-pending{background:#fbbf24;color:white;}
        .status-completed{background:#16a34a;color:white;}
        /* 已完成訂單樣式 */
        .order-completed{
            opacity:0.8;
            border-left:4px solid #16a34a;
        }
    </style>
</head>
<body>
    <div class="max-w-6xl">
        <h1 class="text-2xl font-bold text-center mb-6">🏪 雞老闆輕食料理 後台出菜系統</h1>
        <div class="bg-white rounded-xl p-4 shadow mb-4">
            <h2 class="font-bold text-lg mb-3">📋 最新待出餐訂單</h2>
            <div id="orderBox"></div>
        </div>
    </div>

    <!-- 提示音音頻元素 -->
    <audio id="notificationSound" preload="auto">
        <source src="https://assets.mixkit.co/sfx/preview/mixkit-software-interface-start-2574.mp3" type="audio/mpeg">
    </audio>

    <script>
        // 正確填入你的專案網址 + ANON 匿名金鑰
        const SUPABASE_URL = "https://zexwhzgxunfnbschkizq.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpleHdoemd4dW5mbmJzY2hraXpxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4MzE1MjksImV4cCI6MjA5NzQwNzUyOX0.X-sd8FcJ2AjLq9Ty_KWvjwfJCc2P4IItjRyxSu2vgiU";
        const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // 播放提示音
        function playNotificationSound() {
            const sound = document.getElementById('notificationSound');
            sound.currentTime = 0; // 重置播放位置
            sound.play().catch(err => {
                console.log('播放提示音失敗:', err);
                // 備用提示：如果音頻無法播放，彈出震動提示
                if (navigator.vibrate) {
                    navigator.vibrate([200, 100, 200]);
                }
            });
        }

        // 實時監聽新訂單
        function watchOrder(){
            client.channel('new_order')
            .on('postgres_changes',{
                event:'INSERT',
                schema:'public',
                table:'order_list'
            },(payload)=>{
                playNotificationSound(); // 播放提示音
                alert('🔔 有新訂單進來了！');
                getOrderList();
            }).subscribe()
        }

        // 標記訂單為已完成
        async function completeOrder(orderId) {
            if (!confirm('確認將此訂單標記為已完成？')) return;
            
            const { error } = await client
                .from('order_list')
                .update({ 
                    status: 'completed',
                    complete_time: new Date().toISOString()
                })
                .eq('id', orderId);

            if (error) {
                console.log('更新訂單狀態錯誤', error);
                alert('標記完成失敗，請稍後再試');
            } else {
                alert('✅ 訂單已標記為完成！');
                getOrderList(); // 重新加載訂單列表
            }
        }

        // 刪除訂單
        async function deleteOrder(orderId) {
            if (!confirm('⚠️ 確認要刪除此訂單？此操作無法復原！')) return;
            
            const { error } = await client
                .from('order_list')
                .delete()
                .eq('id', orderId);

            if (error) {
                console.log('刪除訂單錯誤', error);
                alert('刪除訂單失敗，請稍後再試');
            } else {
                alert('🗑️ 訂單已成功刪除！');
                getOrderList(); // 重新加載訂單列表
            }
        }

        // 修正排序語法，解決 .order is not a function
        async function getOrderList(){
            const {data,error} = await client
                .from('order_list')
                .select('*')
                .order('create_time',{ascending:false});

            if(error){
                console.log('讀取訂單錯誤',error);
                return;
            }

            let html = '';
            if (data.length === 0) {
                html = '<div style="text-align:center;padding:20px;color:#6b7280;">目前尚無任何訂單</div>';
            } else {
                data.forEach(order=>{
                    // 訂單類型文字對應
                    let typeText = {
                        smallBamboo:'小筍餐',
                        family:'全家餐',
                        smallSet:'小套餐'
                    }[order.order_type] || '一般點餐';

                    // 訂單狀態處理（預設為 pending）
                    const orderStatus = order.status || 'pending';
                    const statusText = orderStatus === 'completed' ? '已完成' : '待處理';
                    const statusClass = orderStatus === 'completed' ? 'status-completed' : 'status-pending';
                    const orderClass = orderStatus === 'completed' ? 'order-completed' : '';

                    // 組裝菜品清單（含補差價標示）
                    let foodList = '';
                    order.select_food.forEach((item, idx) => {
                        let diffTxt = '';
                        if (['smallBamboo','family','smallSet'].includes(order.order_type) && item.price > 20) {
                            diffTxt = ` (補${item.price - 20}元)`;
                        }
                        foodList += `<div class="order-item ${orderClass}">${idx+1}. ${item.name} ${item.price}元${diffTxt}</div>`;
                    });

                    // 口味資訊處理
                    const flavorInfo = order.flavor_info || {};
                    const toppings = flavorInfo.toppings && flavorInfo.toppings.length > 0 
                        ? flavorInfo.toppings.join('、') 
                        : '無';
                    
                    // 金額明細
                    const mealPrice = ['smallBamboo','family','smallSet'].includes(order.order_type) 
                        ? order.total_price - order.diff_price - (order.flavor_price || 0) 
                        : 0;

                    // 按鈕渲染邏輯：已完成訂單隱藏完成按鈕
                    const completeBtn = orderStatus === 'pending' 
                        ? `<button class="btn btn-complete" onclick="completeOrder(${order.id})">✅ 完成</button>` 
                        : '';

                    html += `
                    <div class="border rounded p-4 mb-3 shadow-sm ${orderClass}">
                        <div class="flex justify-between items-center mb-2">
                            <div class="font-bold text-lg">訂單編號：${order.order_no}</div>
                            <div>
                                <span class="status-tag ${statusClass}">${statusText}</span>
                                <span class="text-gray-500 ml-2">${order.create_time}</span>
                            </div>
                        </div>
                        <div class="mt-1"><strong>訂單類型：</strong>${typeText}</div>
                        <div class="mt-1"><strong>手機末3碼：</strong>${order.phone_last3 || '未填寫'}</div>
                        
                        <div class="mt-2"><strong>選購品項：</strong></div>
                        <div style="margin-left:1rem;">${foodList}</div>
                        
                        <div class="flavor-info mt-2">
                            <div><strong>口味設定：</strong>${flavorInfo.flavor || '原味'}</div>
                            <div><strong>鹹度：</strong>${flavorInfo.salt || '正常'}</div>
                            <div><strong>配料：</strong>${toppings}</div>
                            <div><strong>辣度：</strong>${flavorInfo.spicy || '不辣'}</div>
                        </div>
                        
                        <div class="mt-2">
                            <div><strong>套餐金額：</strong>${mealPrice} 元</div>
                            <div><strong>小菜補差價：</strong>${order.diff_price} 元</div>
                            <div><strong>口味加價：</strong>${order.flavor_price || 0} 元</div>
                            <div class="text-red-600 font-bold mt-1">應付總金額：${order.total_price} 元</div>
                        </div>
                        
                        <!-- 新增操作按鈕區域 -->
                        <div class="mt-4">
                            ${completeBtn}
                            <button class="btn btn-delete" onclick="deleteOrder(${order.id})">🗑️ 刪除</button>
                        </div>
                    </div>
                    `;
                });
            }
            document.getElementById('orderBox').innerHTML = html;
        }

        // 初始化
        getOrderList();
        watchOrder();
        // 5秒自動刷新
        setInterval(getOrderList,5000);
    </script>
</body>
</html>
