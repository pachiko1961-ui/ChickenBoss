<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>雞老闆後台 - 出菜管理</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.43.0"></script>
    <style>
        body{background:#f3f4f6;margin:0;padding:0;font-family:system-ui,sans-serif;}
        .max-w-6xl{max-width:1400px;margin:0 auto;padding:1rem;}
        .text-2xl{font-size:1.5rem;}
        .font-bold{font-weight:bold;}
        .text-center{text-align:center;}
        .mb-6{margin-bottom:1.5rem;}
        .bg-white{background:#fff;}
        .rounded-xl{border-radius:1rem;}
        .p-4{padding:1rem;}
        .shadow{box-shadow:0 2px 8px #00000015;}
        .mb-4{margin-bottom:1rem;}
        .border{border:1px solid #ddd;}
        .rounded{border-radius:0.5rem;}
        .mb-3{margin-bottom:0.75rem;}
        .mt-1{margin-top:0.25rem;}
        .text-red-600{color:#dc2626;}
        .text-green-600{color:#16a34a;}
        .text-gray-500{color:#6b7280;font-size:0.9rem;}
        .flavor-info{background:#fef3c7;padding:0.5rem;border-radius:0.5rem;margin:0.5rem 0;}
        .order-item{border-left:4px solid #ea580c;padding-left:0.5rem;margin:0.25rem 0;}
        .btn{
            padding:0.5rem 1rem;
            border:none;
            border-radius:0.5rem;
            cursor:pointer;
            font-weight:bold;
            margin:0 0.5rem 0 0;
        }
        .btn-complete{background:#16a34a;color:white;}
        .btn-complete:hover{background:#15803d;}
        .btn-delete{background:#dc2626;color:white;}
        .btn-delete:hover{background:#b91c1c;}
        .btn-manage{background:#2563eb;color:white;}
        .btn-manage:hover{background:#1d4ed8;}
        .btn-save{background:#059669;color:white;}
        .btn-save:hover{background:#047857;}
        .btn-cancel{background:#6b7280;color:white;}
        .btn-cancel:hover{background:#4b5563;}
        .btn-delete-all{background:#991b1b;color:white;margin-top:1rem;}
        .btn-delete-all:hover{background:#7f1d1d;}
        .status-tag{
            padding:0.25rem 0.5rem;
            border-radius:0.25rem;
            font-size:0.8rem;
            font-weight:bold;
        }
        .status-pending{background:#fbbf24;color:white;}
        .status-completed{background:#16a34a;color:white;}
        .order-completed{
            opacity:0.8;
            border-left:4px solid #16a34a;
        }
        .manage-modal{
            position:fixed;
            top:0;
            left:0;
            width:100%;
            height:100%;
            background:rgba(0,0,0,0.5);
            display:flex;
            justify-content:center;
            align-items:center;
            z-index:1000;
            display:none;
        }
        .manage-content{
            background:white;
            padding:2rem;
            border-radius:1rem;
            width:90%;
            max-width:800px;
            max-height:90vh;
            overflow-y:auto;
        }
        .form-group{
            margin-bottom:1rem;
        }
        .form-group label{
            display:block;
            margin-bottom:0.5rem;
            font-weight:bold;
        }
        .form-group input, .form-group select, .form-group textarea{
            width:100%;
            padding:0.75rem;
            border:1px solid #ddd;
            border-radius:0.5rem;
            font-size:1rem;
        }
        .food-item{
            display:flex;
            align-items:center;
            padding:0.75rem;
            border:1px solid #eee;
            border-radius:0.5rem;
            margin-bottom:0.5rem;
        }
        .food-item span{
            flex:1;
        }
        .category-section{
            margin-bottom:2rem;
            padding-bottom:1rem;
            border-bottom:1px solid #eee;
        }
        .tab-buttons{
            display:flex;
            gap:0.5rem;
            margin-bottom:1rem;
        }
        .tab-btn{
            padding:0.5rem 1rem;
            border:none;
            border-radius:0.5rem;
            cursor:pointer;
            background:#e5e7eb;
            font-weight:bold;
        }
        .tab-btn.active{
            background:#2563eb;
            color:white;
        }
        .tab-content{
            display:none;
        }
        .tab-content.active{
            display:block;
        }
        .flex{display:flex;}
        .justify-between{justify-content:space-between;}
        .items-center{align-items:center;}
    </style>
</head>
<body>
    <div class="max-w-6xl">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold text-center">🏪 雞老闆輕食料理 後台出菜系統</h1>
            <button class="btn btn-manage" onclick="openManageModal()">⚙️ 管理</button>
        </div>
        <div class="bg-white rounded-xl p-4 shadow mb-4">
            <h2 class="font-bold text-lg mb-3">📋 最新待出餐訂單</h2>
            <div id="orderBox"></div>
        </div>
    </div>

    <div class="manage-modal" id="manageModal">
        <div class="manage-content">
            <h2 class="text-xl font-bold mb-4">📝 菜品與訂單管理</h2>
            <div class="tab-buttons">
                <button class="tab-btn active" onclick="switchTab('category')">菜品分類管理</button>
                <button class="tab-btn" onclick="switchTab('food')">菜品名稱管理</button>
                <button class="tab-btn" onclick="switchTab('order')">訂單管理</button>
            </div>
            <div class="tab-content active" id="categoryTab">
                <div class="category-section">
                    <h3 class="font-bold mb-2">新增菜品分類</h3>
                    <div class="form-group">
                        <label for="newCategoryName">分類名稱</label>
                        <input type="text" id="newCategoryName" placeholder="例如：小筍餐、全家餐">
                    </div>
                    <button class="btn btn-save" onclick="addCategory()">新增分類</button>
                </div>
                <div class="category-section">
                    <h3 class="font-bold mb-2">現有分類列表</h3>
                    <div id="categoryList"></div>
                </div>
            </div>
            <div class="tab-content" id="foodTab">
                <div class="category-section">
                    <h3 class="font-bold mb-2">新增菜品</h3>
                    <div class="form-group">
                        <label for="foodCategory">所屬分類</label>
                        <select id="foodCategory"></select>
                    </div>
                    <div class="form-group">
                        <label for="newFoodName">菜品名稱</label>
                        <input type="text" id="newFoodName" placeholder="例如：招牌雞排、鹹酥雞">
                    </div>
                    <div class="form-group">
                        <label for="newFoodPrice">菜品價格</label>
                        <input type="number" id="newFoodPrice" placeholder="請輸入價格" min="0">
                    </div>
                    <button class="btn btn-save" onclick="addFood()">新增菜品</button>
                </div>
                <div class="category-section">
                    <h3 class="font-bold mb-2">現有菜品列表</h3>
                    <div id="foodList"></div>
                </div>
            </div>
            <div class="tab-content" id="orderTab">
                <div class="category-section">
                    <h3 class="font-bold mb-2">訂單批量操作</h3>
                    <p class="text-red-600 mb-2">⚠️ 以下操作將刪除所有訂單，請謹慎操作！</p>
                    <button class="btn btn-delete-all" onclick="deleteAllOrders()">🗑️ 刪除所有訂單</button>
                </div>
                <div class="category-section">
                    <h3 class="font-bold mb-2">訂單統計</h3>
                    <div id="orderStats"></div>
                </div>
            </div>
            <div class="mt-4">
                <button class="btn btn-cancel" onclick="closeManageModal()">❌ 關閉</button>
            </div>
        </div>
    </div>

    <audio id="notificationSound" preload="auto">
        <source src="https://assets.mixkit.co/sfx/preview/mixkit-software-interface-start-2574.mp3" type="audio/mpeg">
    

    <script>
        const SUPABASE_URL = "https://zexwhzgxunfnbschkizq.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpleHdoemd4dW5mbmJzY2hraXpxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4MzE1MjksImV4cCI6MjA5NzQwNzUyOX0.X-sd8FcJ2AjLq9Ty_KWvjwfJCc2P4IItjRyxSu2vgiU";
        const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function playNotificationSound() {
            const sound = document.getElementById('notificationSound');
            sound.currentTime = 0;
            sound.play().catch(err => {
                console.log('播放提示音失敗:', err);
                if (navigator.vibrate) navigator.vibrate([200,100,200]);
            });
        }

        function watchOrder(){
            client.channel('new_order')
            .on('postgres_changes',{
                event:'INSERT',
                schema:'public',
                table:'order_list'
            },()=>{
                playNotificationSound();
                alert('🔔 有新訂單進來了！');
                getOrderList();
            }).subscribe();
        }

        async function completeOrder(orderId) {
            if (!confirm('確認將此訂單標記為已完成？')) return;
            const { error } = await client
                .from('order_list')
                .update({ status: 'completed', complete_time: new Date().toISOString() })
                .eq('id', orderId);
            if (error) {
                console.log('更新訂單狀態錯誤', error);
                alert('標記完成失敗，請稍後再試');
            } else getOrderList();
        }

        async function deleteOrder(orderId) {
            if (!confirm('⚠️ 確認要刪除此訂單？此操作無法復原！')) return;
            const { error } = await client.from('order_list').delete().eq('id', orderId);
            if (error) {
                console.log('刪除訂單錯誤', error);
                alert('刪除訂單失敗，請稍後再試');
            } else getOrderList();
        }

        async function deleteAllOrders() {
            if (!confirm('⚠️ 確認要刪除所有訂單？此操作無法復原！\n請再次確認！')) return;
            const { data: orders, error: fetchError } = await client.from('order_list').select('id');
            if (fetchError) {
                console.log('取得訂單列表錯誤', fetchError);
                alert('取得訂單列表失敗，請稍後再試');
                return;
            }
            if (orders.length > 0) {
                const orderIds = orders.map(item=>item.id);
                const { error: delErr } = await client.from('order_list').delete().in('id', orderIds);
                if (delErr) {
                    console.log('刪除全部訂單錯誤', delErr);
                    alert('刪除訂單失敗');
                } else {
                    alert('✅ 所有訂單已刪除');
                    getOrderList();
                    getOrderStats();
                }
            } else alert('📭 目前沒有任何訂單可刪除');
        }

        async function getOrderStats() {
            const { count: totalCount, error: totalErr } = await client.from('order_list').select('*', { count:'exact', head:true });
            const { count: doneCount, error: doneErr } = await client.from('order_list').select('*', { count:'exact', head:true }).eq('status','completed');
            if (totalErr || doneErr) {
                document.getElementById('orderStats').innerHTML = '<p class="text-red-600">無法載入統計</p>';
                return;
            }
            const pending = totalCount - doneCount;
            document.getElementById('orderStats').innerHTML = `
                <div>總訂單數：${totalCount} 筆</div>
                <div>待處理訂單：${pending} 筆</div>
                <div>已完成訂單：${doneCount} 筆</div>
            `;
        }

        async function getOrderList(){
            const {data,error} = await client.from('order_list').select('*').order('create_time',{ascending:false});
            if(error){
                console.log('讀取訂單錯誤',error);
                return;
            }
            let html = '';
            if (data.length === 0) {
                html = '<div style="text-align:center;padding:20px;color:#6b7280;">目前尚無任何訂單</div>';
            } else {
                data.forEach(order=>{
                    const typeText = {smallBamboo:'小筍餐',family:'全家餐',smallSet:'小套餐'}[order.order_type] || '一般點餐';
                    const orderStatus = order.status || 'pending';
                    const statusText = orderStatus === 'completed' ? '已完成' : '待處理';
                    const statusClass = orderStatus === 'completed' ? 'status-completed' : 'status-pending';
                    const orderClass = orderStatus === 'completed' ? 'order-completed' : '';
                    let foodList = '';
                    order.select_food.forEach((item, idx) => {
                        let diffTxt = '';
                        if (['smallBamboo','family','smallSet'].includes(order.order_type) && item.price > 20) {
                            diffTxt = ` (補${item.price - 20}元)`;
                        }
                        foodList += `<div class="order-item ${orderClass}">${idx+1}. ${item.name} ${item.price}元${diffTxt}</div>`;
                    });
                    const flavorInfo = order.flavor_info || {};
                    const toppings = (flavorInfo.toppings && flavorInfo.toppings.length>0) ? flavorInfo.toppings.join('、') : '無';
                    const mealPrice = ['smallBamboo','family','smallSet'].includes(order.order_type) ? (order.total_price - order.diff_price - (order.flavor_price||0)) : 0;
                    const completeBtn = orderStatus === 'pending' ? `<button class="btn btn-complete" onclick="completeOrder(${order.id})">✅ 完成</button>` : '';
                    html += `
                    <div class="border rounded p-4 mb-3 shadow-sm ${orderClass}">
                        <div class="flex justify-between items-center mb-2">
                            <div class="font-bold text-lg">訂單編號：${order.order_no}</div>
                            <div>
                                <span class="status-tag ${statusClass}">${statusText}</span>
                                <span class="text-gray-500 ml-2">${order.create_time}</span>
                            </div>
                        </div>
                        <div class="mt-1"><strong>訂單類型：</strong>${typeText}</div>
                        <div class="mt-1"><strong>手機末3碼：</strong>${order.phone_last3 || '未填寫'}</div>
                        <div class="mt-2"><strong>選購品項：</strong></div>
                        <div style="margin-left:1rem;">${foodList}</div>
                        <div class="flavor-info mt-2">
                            <div><strong>口味設定：</strong>${flavorInfo.flavor || '原味'}</div>
                            <div><strong>鹹度：</strong>${flavorInfo.salt || '正常'}</div>
                            <div><strong>配料：</strong>${toppings}</div>
                            <div><strong>辣度：</strong>${flavorInfo.spicy || '不辣'}</div>
                        </div>
                        <div class="mt-2">
                            <div><strong>套餐金額：</strong>${mealPrice} 元</div>
                            <div><strong>小菜補差價：</strong>${order.diff_price} 元</div>
                            <div><strong>口味加價：</strong>${order.flavor_price || 0} 元</div>
                            <div class="text-red-600 font-bold mt-1">應付總金額：${order.total_price} 元</div>
                        </div>
                        <div class="mt-4">
                            ${completeBtn}
                            <button class="btn btn-delete" onclick="deleteOrder(${order.id})">🗑️ 刪除</button>
                        </div>
                    </div>`;
                });
            }
            document.getElementById('orderBox').innerHTML = html;
        }

        // 管理彈窗相關
        function openManageModal() {
            document.getElementById('manageModal').style.display = 'flex';
            loadCategories();
            loadFoods();
            getOrderStats();
        }
        function closeManageModal() {
            document.getElementById('manageModal').style.display = 'none';
        }
        function switchTab(tabName) {
            document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
            document.querySelector(`.tab-btn[onclick="switchTab('${tabName}')"]`).classList.add('active');
            document.getElementById(`${tabName}Tab`).classList.add('active');
        }

        async function loadCategories() {
            const { data, error } = await client.from('food_category').select('*').order('name',{ascending:true});
            if (error) {
                console.log('載入分類錯誤', error);
                document.getElementById('categoryList').innerHTML = '<p class="text-red-600">food_category 資料表不存在</p>';
                return;
            }
            let html = '';
            if (data.length === 0) html = '<p>尚無分類</p>';
            else data.forEach(cat=>{
                html += `<div class="food-item"><span>${cat.name}</span><button class="btn btn-delete" onclick="deleteCategory(${cat.id})">刪除</button></div>`;
            });
            document.getElementById('categoryList').innerHTML = html;
            let selHtml = '<option value="">請選擇分類</option>';
            data.forEach(cat=>selHtml += `<option value="${cat.id}">${cat.name}</option>`);
            document.getElementById('foodCategory').innerHTML = selHtml;
        }
        async function addCategory() {
            const name = document.getElementById('newCategoryName').value.trim();
            if (!name) return alert('請輸入分類名稱');
            const { error } = await client.from('food_category').insert([{name}]);
            if (error) alert('新增分類失敗');
            else {
                alert('新增成功');
                document.getElementById('newCategoryName').value = '';
                loadCategories();
            }
        }
        async function deleteCategory(cid) {
            if (!confirm('確認刪除此分類？')) return;
            const { error } = await client.from('food_category').delete().eq('id', cid);
            if (error) alert('刪除失敗');
            else {
                loadCategories();
                loadFoods();
            }
        }

        async function loadFoods() {
            const { data, error } = await client.from('food_product').select('*,food_category(name)').order('name',{ascending:true});
            if (error) {
                document.getElementById('foodList').innerHTML = '<p class="text-red-600">foods 資料表不存在</p>';
                return;
            }
            let html = '';
            if (data.length === 0) html = '<p>尚無菜品</p>';
            else data.forEach(f=>{
                const cName = f.food_category?.name || '未分類';
                html += `<div class="food-item"><span>${f.name} - ${f.price}元 (${cName})</span><button class="btn btn-delete" onclick="deleteFood(${f.id})">刪除</button></div>`;
            });
            document.getElementById('foodList').innerHTML = html;
        }
        async function addFood() {
            const cid = document.getElementById('foodCategory').value;
            const name = document.getElementById('newFoodName').value.trim();
            const price = Number(document.getElementById('newFoodPrice').value);
            if (!cid) return alert('請選擇分類');
            if (!name) return alert('請輸入菜品名稱');
            if (isNaN(price) || price < 0) return alert('請輸入合法價格');
            const { error } = await client.from('food_product').insert([{name, price, cate_id:Number(cid)}]);
            if (error) alert('新增菜品失敗');
            else {
                document.getElementById('newFoodName').value = '';
                document.getElementById('newFoodPrice').value = '';
                loadFoods();
            }
        }
        async function deleteFood(fid) {
            if (!confirm('確認刪除菜品？')) return;
            const { error } = await client.from('food_product').delete().eq('id', fid);
            if (!error) loadFoods();
            else alert('刪除失敗');
        }

        // 初始化
        getOrderList();
        watchOrder();
        setInterval(getOrderList,5000);
        document.getElementById('manageModal').addEventListener('click',function(e){
            if(e.target === this) closeManageModal();
        });
    </script>
</body>
</html>
