<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>雞老闆後台管理系統</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{padding:20px;font-family:微軟正黑體;background:#f5f5f5;}
.box{background:#fff;padding:20px;border-radius:10px;margin-bottom:20px;}
h3{margin-bottom:15px;color:#d63031;}
input,select,textarea{width:100%;padding:8px;margin:6px 0;border:1px solid #ccc;border-radius:6px;}
button{padding:8px 16px;background:#d63031;color:#fff;border:none;border-radius:6px;cursor:pointer;margin:5px 0;}
table{width:100%;border-collapse:collapse;margin-top:10px;}
th,td{border:1px solid #ddd;padding:8px;text-align:center;}
.tab{display:flex;gap:10px;margin-bottom:15px;}
.tab-btn{padding:8px 15px;border-radius:6px;border:1px solid #d63031;color:#d63031;cursor:pointer;}
.tab-btn.active{background:#d63031;color:#fff;}
.hide{display:none;}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<h2>雞老闆輕食料理 後台管理</h2>

<div class="tab">
    <div class="tab-btn active" onclick="switchTab(0)">分類管理</div>
    <div class="tab-btn" onclick="switchTab(1)">菜品管理</div>
</div>

<!-- 分類管理 -->
<div class="box" id="cateBox">
    <h3>新增分類</h3>
    <input type="text" id="cateName" placeholder="輸入分類名稱">
    <input type="number" id="cateSort" placeholder="排序數字" value="0">
    <button onclick="addCategory">新增</button>
    <h3>分類列表</h3>
    <div id="cateTable"></div>
</div>

<!-- 菜品管理 -->
<div class="box hide" id="foodBox">
    <h3>新增/編輯菜品</h3>
    <select id="selectCate"></select>
    <input type="text" id="foodName" placeholder="菜品名稱">
    <input type="number" id="foodPrice" placeholder="價格">
    <input type="text" id="foodImg" placeholder="圖片網址">
    <textarea id="foodDesc" placeholder="菜品詳細介紹"></textarea>
    <textarea id="foodRemark" placeholder="備註資訊"></textarea>
    <input type="hidden" id="editFoodId">
    <button onclick="saveFood()">儲存菜品</button>
    <h3>菜品列表</h3>
    <div id="foodTable"></div>
</div>

<script>
// 填入同樣 Supabase 資訊
const SUPABASE_URL = "https://zexwhzgxunfnbschkizq.supabase.co";
const SUPABASE_KEY = "sb_publishable_OPftLOAUJFzwKZ8eK7GIXg_2LEEMMwn";
const supabase = window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

function switchTab(idx){
    document.querySelectorAll(".tab-btn").forEach((v,i)=>{
        v.classList.toggle("active",i===idx);
    })
    document.getElementById("cateBox").classList.toggle("hide",idx!==0);
    document.getElementById("foodBox").classList.toggle("hide",idx!==1);
    if(idx===0)loadCateAdmin();
    if(idx===1){loadCateSelect();loadFoodAdmin();}
}

// 分類後台
async function loadCateAdmin(){
    const {data} = await supabase.from("food_category").select("*").order("sort");
    let html = `<table><tr><th>名稱</th><th>排序</th><th>操作</th></tr>`;
    data.forEach(item=>{
        html += `
        <tr>
            <td>${item.name}</td>
            <td>${item.sort}</td>
            <td>
                <button onclick="delCate(${item.id})">刪除</button>
            </td>
        </tr>`
    })
    html += `</table>`;
    document.getElementById("cateTable").innerHTML = html;
}
async function addCategory(){
    let name = document.getElementById("cateName").value.trim();
    let sort = parseInt(document.getElementById("cateSort").value)||0;
    if(!name)return alert("請輸入分類名稱");
    await supabase.from("food_category").insert([{name,sort}]);
    alert("新增成功");
    loadCateAdmin();
}
async function delCate(id){
    if(!confirm("確定刪除?"))return;
    await supabase.from("food_category").delete().eq("id",id);
    loadCateAdmin();
}

// 菜品後台
async function loadCateSelect(){
    const {data} = await supabase.from("food_category").select("*").order("sort");
    let html = "";
    data.forEach(item=>html+=`<option value="${item.id}">${item.name}</option>`);
    document.getElementById("selectCate").innerHTML = html;
}
async function loadFoodAdmin(){
    const {data} = await supabase.from("food_product").select("*,food_category(name)").order("sort");
    let html = `<table>
    <tr>
        <th>分類</th><th>名稱</th><th>價格</th><th>狀態</th><th>操作</th>
    </tr>`;
    data.forEach(item=>{
        html += `
        <tr>
            <td>${item.food_category?.name||''}</td>
            <td>${item.name}</td>
            <td>$${item.price}</td>
            <td>${item.status?"上架":"下架"}</td>
            <td>
                <button onclick="editFood(${item.id})">編輯</button>
                <button onclick="changeStatus(${item.id},${!item.status})">上下架</button>
                <button onclick="delFood(${item.id})">刪除</button>
            </td>
        </tr>`
    })
    html += `</table>`;
    document.getElementById("foodTable").innerHTML = html;
}
async function saveFood(){
    let cid = document.getElementById("selectCate").value;
    let name = document.getElementById("foodName").value.trim();
    let price = parseInt(document.getElementById("foodPrice").value);
    let img = document.getElementById("foodImg").value.trim();
    let desc = document.getElementById("foodDesc").value.trim();
    let remark = document.getElementById("foodRemark").value.trim();
    let eid = document.getElementById("editFoodId").value;
    if(!name||!price)return alert("請填寫完整名稱與價格");
    let post = {cate_id:cid,name,price,image_url:img,description:desc,remark};
    if(eid){
        await supabase.from("food_product").update(post).eq("id",eid);
    }else{
        await supabase.from("food_product").insert([post]);
    }
    alert("儲存成功");
    clearFoodForm();
    loadFoodAdmin();
}
function clearFoodForm(){
    document.getElementById("foodName").value="";
    document.getElementById("foodPrice").value="";
    document.getElementById("foodImg").value="";
    document.getElementById("foodDesc").value="";
    document.getElementById("foodRemark").value="";
    document.getElementById("editFoodId").value="";
}
async function editFood(id){
    const {data} = await supabase.from("food_product").select("*").eq("id",id).single();
    document.getElementById("editFoodId").value = id;
    document.getElementById("selectCate").value = data.cate_id;
    document.getElementById("foodName").value = data.name;
    document.getElementById("foodPrice").value = data.price;
    document.getElementById("foodImg").value = data.image_url||"";
    document.getElementById("foodDesc").value = data.description||"";
    document.getElementById("foodRemark").value = data.remark||"";
}
async function changeStatus(id,st){
    await supabase.from("food_product").update({status:st}).eq("id",id);
    loadFoodAdmin();
}
async function delFood(id){
    if(!confirm("確定刪除菜品?"))return;
    await supabase.from("food_product").delete().eq("id",id);
    loadFoodAdmin();
}

window.onload=()=>loadCateAdmin();
</script>
</body>
</html>
